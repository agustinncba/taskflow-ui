<div class="min-h-screen bg-slate-900 text-white p-6">
  <div class="max-w-4xl mx-auto">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-emerald-400">Mis Tareas</h1>
      <button (click)="logout()" class="text-slate-400 hover:text-white transition-colors cursor-pointer">Cerrar Sesión</button>
    </div>

    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input [(ngModel)]="nuevaTarea.titulo" placeholder="Título de la tarea" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-emerald-500">
        <input [(ngModel)]="nuevaTarea.descripcion" placeholder="Descripción (opcional)" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-emerald-500">
      </div>
      <button (click)="agregarTarea()" class="mt-4 w-full bg-emerald-600 p-3 rounded-lg font-bold hover:bg-emerald-500 transition-colors cursor-pointer">
        + Añadir Tarea
      </button>
    </div>

    <div class="grid grid-cols-1 gap-6">
      <app-tarea-card 
        *ngFor="let t of tareas" 
        [tarea]="t">
      </app-tarea-card>
      
      <div *ngIf="tareas.length === 0" class="text-center py-16 bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-700">
        <p class="text-slate-500 font-medium italic">No hay misiones pendientes para hoy.</p>
      </div>
    </div>

  </div>
</div>
