<div class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300"
     [ngClass]="theme.isDarkMode() ? 'bg-slate-900' : 'bg-gray-100'">
  <div class="max-w-md w-full rounded-2xl shadow-xl p-8 border transition-colors duration-300"
       [ngClass]="theme.isDarkMode() ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200'">
    
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <app-theme-toggle class="text-slate-400"></app-theme-toggle>
      </div>
      <h2 class="text-3xl font-bold mb-2" [ngClass]="theme.isDarkMode() ? 'text-white' : 'text-gray-900'">Crear Cuenta</h2>
      <p [ngClass]="theme.isDarkMode() ? 'text-slate-400' : 'text-gray-500'">Únete a TaskFlow para gestionar tus tareas</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <div>
        <label class="block text-sm font-medium mb-1" [ngClass]="theme.isDarkMode() ? 'text-slate-300' : 'text-gray-700'">Nombre Completo</label>
        <input 
          type="text" 
          formControlName="nombre"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          [ngClass]="theme.isDarkMode() ? 'bg-slate-900 border-slate-700 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'"
          placeholder="Ej: Noelia"
        >
      </div>

      <div>
        <label class="block text-sm font-medium mb-1" [ngClass]="theme.isDarkMode() ? 'text-slate-300' : 'text-gray-700'">Email</label>
        <input 
          type="email" 
          formControlName="email"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          [ngClass]="theme.isDarkMode() ? 'bg-slate-900 border-slate-700 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'"
          placeholder="tu@email.com"
        >
      </div>

      <div>
        <label class="block text-sm font-medium mb-1" [ngClass]="theme.isDarkMode() ? 'text-slate-300' : 'text-gray-700'">Contraseña</label>
        <input 
          type="password" 
          formControlName="password"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          [ngClass]="theme.isDarkMode() ? 'bg-slate-900 border-slate-700 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'"
          placeholder="Mínimo 6 caracteres"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="registerForm.invalid"
        class="w-full py-3 mt-4 px-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-semibold rounded-lg transition-colors cursor-pointer"
      >
        Registrarse
      </button>

    </form>

    <div class="mt-6 text-center">
      <p class="text-sm" [ngClass]="theme.isDarkMode() ? 'text-slate-400' : 'text-gray-500'">
        ¿Ya tienes cuenta? 
        <a routerLink="/login" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors cursor-pointer">Inicia sesión aquí</a>
      </p>
    </div>

  </div>
</div>
