<div class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300"
     [ngClass]="theme.isDarkMode() ? 'bg-slate-900' : 'bg-gray-100'">
  <div class="max-w-md w-full rounded-2xl shadow-xl p-8 border transition-colors duration-300"
       [ngClass]="theme.isDarkMode() ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200'">

    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <app-theme-toggle class="text-slate-400"></app-theme-toggle>
      </div>
      <h2 class="text-4xl font-bold mb-2 taskflow-title" [ngClass]="theme.isDarkMode() ? 'text-white' : 'text-gray-900'">TaskFlow</h2>
      <p [ngClass]="theme.isDarkMode() ? 'text-slate-400' : 'text-gray-500'">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <div>
        <label class="block text-sm font-medium mb-2" [ngClass]="theme.isDarkMode() ? 'text-slate-300' : 'text-gray-700'">Email</label>
        <input type="email" formControlName="email"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          [ngClass]="theme.isDarkMode() ? 'bg-slate-900 border-slate-700 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'"
          placeholder="tu@email.com">
      </div>

      <div>
        <label class="block text-sm font-medium mb-2" [ngClass]="theme.isDarkMode() ? 'text-slate-300' : 'text-gray-700'">Contraseña</label>
        <input type="password" formControlName="password"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          [ngClass]="theme.isDarkMode() ? 'bg-slate-900 border-slate-700 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'"
          placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-semibold rounded-lg transition-colors cursor-pointer">
        Ingresar
      </button>

      <div class="mt-6 text-center">
        <p class="text-sm" [ngClass]="theme.isDarkMode() ? 'text-slate-400' : 'text-gray-500'">
          ¿No tienes cuenta?
          <a routerLink="/registro"
            class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors cursor-pointer">Regístrate
            gratis</a>
        </p>
      </div>

    </form>
  </div>
</div>
