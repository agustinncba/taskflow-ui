<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-700">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">TaskFlow</h2>
      <p class="text-slate-400">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
        <input 
          type="email" 
          formControlName="email"
          class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          placeholder="tu@email.com"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
        <input 
          type="password" 
          formControlName="password"
          class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
          placeholder="••••••••"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid"
        class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-semibold rounded-lg transition-colors cursor-pointer"
      >
        Ingresar
      </button>

    </form>
  </div>
</div>
